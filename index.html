    <h1 style="margin-bottom: 10px;">Sistema de Monitoreo de Partículas</h1>

  Este sistema permite monitorear partículas en tiempo real. Aquí puedes ver datos, gráficas y alertas sobre la calidad del aire y otros parámetros ambientales.
</div>

<script>
  const helpButton = document.getElementById("helpButton");
  const infoBox = document.getElementById("infoBox");

  helpButton.addEventListener("click", () => {
    infoBox.style.display = infoBox.style.display === "none" ? "block" : "none";
  });
</script>
